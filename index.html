<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Flowers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
    radial-gradient(circle at center,
    #07132b 0%,
    #020611 70%,
    #000 100%);
    
    display:flex;
    justify-content:center;
    align-items:center;
}

/* STARS */

.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
}

/* FLOWER AREA */

.scene{
    position:relative;
    width:100vw;
    height:100vh;
}

/* GRASS */

.grass{
    position:absolute;
    bottom:-20px;
    width:140px;
    height:240px;
    border-radius:100px;
    border-left:7px solid #2aff66;
    transform-origin:bottom;
    filter:blur(0.3px);
}

.g1{
    left:5%;
    transform:rotate(-10deg);
}

.g2{
    left:15%;
    height:200px;
    transform:rotate(8deg);
}

.g3{
    left:75%;
    height:220px;
    transform:rotate(-8deg);
}

.g4{
    left:88%;
    height:250px;
    transform:rotate(10deg);
}

/* FLOWERS */

.flower{
    position:absolute;
    bottom:120px;
}

.stem{
    position:absolute;
    width:8px;
    background:#3cff78;
    border-radius:20px;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
}

/* LEAVES */

.leaf{
    position:absolute;
    width:60px;
    height:28px;
    background:#16c45b;
    border-radius:60px 0;
}

/* PETALS */

.petal{
    position:absolute;
    width:42px;
    height:28px;
    background:#ffc0d9;
    border-radius:50%;
    box-shadow:
    0 0 20px rgba(255,192,217,0.7);
}

.center{
    position:absolute;
    width:22px;
    height:10px;
    background:#fff3b0;
    border-radius:50%;
}

/* FLOWER POSITIONS */

.f1{
    left:42%;
    bottom:220px;
}

.f2{
    left:48%;
    bottom:280px;
}

.f3{
    left:54%;
    bottom:220px;
}

.f4{
    left:60%;
    bottom:250px;
}

.f5{
    left:36%;
    bottom:250px;
}

/* STEM HEIGHTS */

.f1 .stem{
    height:200px;
}

.f2 .stem{
    height:260px;
}

.f3 .stem{
    height:210px;
}

.f4 .stem{
    height:240px;
}

.f5 .stem{
    height:230px;
}

/* PETAL POSITIONS */

.p1{
    top:-10px;
    left:10px;
}

.p2{
    top:10px;
    left:-5px;
}

.p3{
    top:10px;
    right:-5px;
}

.p4{
    top:25px;
    left:10px;
}

.center{
    top:18px;
    left:20px;
}

/* LEAVES */

.l1{
    left:-50px;
    top:120px;
    transform:rotate(-35deg);
}

.l2{
    right:-50px;
    top:160px;
    transform:rotate(145deg);
}

/* FLOATING HEARTS */

.heart{
    position:absolute;
    color:#ff7eb6;
    font-size:30px;
    animation:float 6s linear infinite;
    opacity:0.8;
}

/* GLOW CIRCLES */

.circle{
    position:absolute;
    border:2px solid rgba(255,192,217,0.4);
    border-radius:50%;
    animation:pulse 4s infinite;
}

/* ANIMATIONS */

@keyframes sway{

    0%{
        transform:rotate(-2deg);
    }

    50%{
        transform:rotate(2deg);
    }

    100%{
        transform:rotate(-2deg);
    }
}

@keyframes float{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

@keyframes pulse{

    0%{
        transform:scale(0.8);
        opacity:0.2;
    }

    50%{
        opacity:0.7;
    }

    100%{
        transform:scale(1.4);
        opacity:0;
    }
}

.flower{
    animation:sway 4s ease-in-out infinite;
}

/* MOBILE */

@media(max-width:700px){

    .flower{
        transform:scale(0.9);
    }
}

</style>
</head>

<script>

/* STARS */

const stars =
document.querySelector('.stars');

for(let i=0;i<120;i++){

    const star =
    document.createElement('div');

    star.classList.add('star');

    star.style.left =

    star.style.top =

    star.style.opacity =

/* FLOATING HEARTS */

function createHeart(){

    const heart =
    document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML='❤';

    heart.style.left =
    Math.random()*100 + 'vw';

    heart.style.top =
    '100vh';

    heart.style.fontSize =
    Math.random()*20+20+'px';

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },6000);
}

setInterval(createHeart,900);

/* CIRCLES */

for(let i=0;i<8;i++){

    const circle =
    document.createElement('div');

    circle.classList.add('circle');

    circle.style.width =
    Math.random()*50+20+'px';

    circle.style.height =
    circle.style.width;

    circle.style.left =
    Math.random()*100+'vw';

    circle.style.top =
    Math.random()*100+'vh';

    circle.style.animationDelay =
    Math.random()*4+'s';

    document.body.appendChild(circle);
}

</script>
