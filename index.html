<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Flowers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:
    radial-gradient(circle at center,
    #071b3b 0%,
    #020611 70%,
    #000 100%);
    
    height:100vh;
}

/* CANVAS */

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* GLOW */

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:
    radial-gradient(circle,
    rgba(255,105,180,0.18),
    transparent 70%);
    
    left:50%;
    top:45%;
    
    transform:translate(-50%,-50%);
    
    filter:blur(40px);
}

/* HEARTS */

.heart{
    position:absolute;
    color:#ff9ac6;
    opacity:0.8;
    animation:float 6s linear infinite;
    pointer-events:none;
}

/* BUTTON */

button{
    position:absolute;
    bottom:60px;
    left:50%;
    
    transform:translateX(-50%);
    
    border:none;

    padding:18px 55px;

    border-radius:40px;

    font-size:28px;

    color:white;

    background:
    linear-gradient(
    to right,
    #ff6ba9,
    #ff4d88);

    box-shadow:
    0 0 25px rgba(255,105,180,0.7);

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:
    translateX(-50%)
    scale(1.08);
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="glow"></div>

<canvas id="canvas"></canvas>

<button onclick="burst()">
Click Me 💖
</button>

<script>

const canvas =
document.getElementById('canvas');

const ctx =
canvas.getContext('2d');

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

/* STARS */

const stars = [];

for(let i=0;i<150;i++){

    stars.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2

    });
}

/* FLOWERS */

const flowers = [

{x:0.45,y:0.68,s:1.1},
{x:0.52,y:0.55,s:1.3},
{x:0.60,y:0.66,s:1.1},
{x:0.36,y:0.64,s:1},
{x:0.68,y:0.60,s:1}

];

function drawFlower(x,y,scale){

    const px =
    x*canvas.width;

    const py =
    y*canvas.height;

    ctx.save();

    ctx.translate(px,py);

    ctx.scale(scale,scale);

    /* STEM */

    ctx.strokeStyle="#2aff7a";

    ctx.lineWidth=6;

    ctx.beginPath();

    ctx.moveTo(0,120);

    ctx.quadraticCurveTo(
    10,50,
    0,0);

    ctx.stroke();

    /* LEAVES */

    ctx.fillStyle="#16c45b";

    ctx.beginPath();

    ctx.ellipse(
    -25,70,
    25,10,
    -0.5,0,
    Math.PI*2);

    ctx.fill();

    ctx.beginPath();

    ctx.ellipse(
    25,50,
    25,10,
    0.5,0,
    Math.PI*2);

    ctx.fill();

    /* PETALS */

    for(let i=0;i<5;i++){

        ctx.save();

        ctx.rotate(
        (Math.PI*2/5)*i);

        const gradient =
        ctx.createRadialGradient(
        0,-28,5,
        0,-28,35);

        gradient.addColorStop(
        0,
        "#fff");

        gradient.addColorStop(
        1,
        "#ffc0d9");

        ctx.fillStyle=gradient;

        ctx.beginPath();

        ctx.ellipse(
        0,-28,
        30,18,
        0,0,
        Math.PI*2);

        ctx.fill();

        ctx.restore();
    }

    /* CENTER */

    const glow =
    ctx.createRadialGradient(
    0,0,0,
    0,0,20);

    glow.addColorStop(
    0,
    "#fff7b0");

    glow.addColorStop(
    1,
    "#ffd166");

    ctx.fillStyle=glow;

    ctx.beginPath();

    ctx.arc(
    0,0,
    16,
    0,
    Math.PI*2);

    ctx.fill();

    ctx.restore();
}

/* GRASS */

function drawGrass(){

    for(let i=0;i<35;i++){

        const x =
        Math.random()*canvas.width;

        const h =
        Math.random()*140+80;

        ctx.strokeStyle=
        "#1aff66";

        ctx.lineWidth=
        Math.random()*3+2;

        ctx.beginPath();

        ctx.moveTo(
        x,
        canvas.height);

        ctx.quadraticCurveTo(
        x+Math.random()*60-30,
        canvas.height-h/2,

        x+Math.random()*40-20,
        canvas.height-h);

        ctx.stroke();
    }
}

/* HEARTS */

function createHeart(){

    const heart =
    document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML='❤';

    heart.style.left=
    Math.random()*100+'vw';

    heart.style.top=
    '100vh';

    heart.style.fontSize=
    Math.random()*25+20+'px';

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },6000);
}

setInterval(createHeart,800);

/* BUTTON BURST */

function burst(){

    for(let i=0;i<20;i++){

        createHeart();
    }
}

/* ANIMATION */

function animate(){

    ctx.clearRect(
    0,0,
    canvas.width,
    canvas.height);

    /* STARS */

    stars.forEach(s=>{

        ctx.fillStyle=
        "white";

        ctx.globalAlpha=
        Math.random();

        ctx.beginPath();

        ctx.arc(
        s.x,s.y,s.r,
        0,
        Math.PI*2);

        ctx.fill();
    });

    ctx.globalAlpha=1;

    /* GRASS */

    drawGrass();

    /* FLOWERS */

    flowers.forEach(f=>{

        drawFlower(
        f.x,
        f.y,
        f.s);
    });

    requestAnimationFrame(
    animate);
}

animate();

/* RESIZE */

window.addEventListener(
'resize',()=>{

    canvas.width=
    window.innerWidth;

    canvas.height=
    window.innerHeight;
});

</script>

</body>
</html>
