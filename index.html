<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Bouquet</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f7f4ef;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:'Courier New', monospace;
}

/* PAPER CARD */

.card{
    width:420px;
    height:760px;
    background:white;
    border-radius:10px;
    position:relative;
    overflow:hidden;

    box-shadow:
    0 0 40px rgba(0,0,0,0.15);
}

/* FLOWERS AREA */

.bouquet{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:350px;
    height:430px;
}

/* FLOWER BASE */

.flower{
    position:absolute;
    border-radius:50%;
    animation:float 4s ease-in-out infinite;
}

/* SUNFLOWER */

.sunflower{
    width:120px;
    height:120px;
    background:
    radial-gradient(circle,
    #6d3d00 20%,
    #ffb300 21%,
    #ffd54f 60%,
    #ffca28 100%);

    top:0;
    right:40px;

    box-shadow:
    0 0 20px rgba(255,200,0,0.5);
}

/* ROSES */

.rose1{
    width:90px;
    height:90px;

    background:
    radial-gradient(circle,
    #ffb3b3,
    #ff4d6d,
    #c9184a);

    top:20px;
    left:40px;
}

.rose2{
    width:85px;
    height:85px;

    background:
    radial-gradient(circle,
    #ffc2d1,
    #ff758f,
    #ff0a54);

    top:140px;
    right:40px;
}

.rose3{
    width:100px;
    height:100px;

    background:
    radial-gradient(circle,
    #ffd6e0,
    #ff5c8a,
    #d90429);

    top:250px;
    left:80px;
}

/* BLUE FLOWER */

.blue{
    width:90px;
    height:90px;

    background:
    radial-gradient(circle,
    #dff6ff,
    #7bdff2,
    #4361ee);

    top:220px;
    right:120px;
}

/* PURPLE FLOWER */

.purple{
    width:100px;
    height:100px;

    background:
    radial-gradient(circle,
    #efe1ff,
    #b388eb,
    #7b2cbf);

    top:320px;
    left:150px;
}

/* SMALL FLOWERS */

.small1,
.small2,
.small3{

    width:55px;
    height:55px;

    background:
    radial-gradient(circle,
    white,
    #ffd6ff,
    #ff99c8);

}

.small1{
    top:150px;
    left:10px;
}

.small2{
    top:280px;
    right:20px;
}

.small3{
    top:80px;
    left:150px;
}

/* LEAVES */

.leaf{
    position:absolute;
    width:70px;
    height:30px;
    background:#4f772d;
    border-radius:50px;
    opacity:0.8;
}

.l1{
    top:120px;
    left:0;
    transform:rotate(-40deg);
}

.l2{
    top:180px;
    right:0;
    transform:rotate(35deg);
}

.l3{
    top:320px;
    left:20px;
    transform:rotate(-20deg);
}

.l4{
    top:350px;
    right:30px;
    transform:rotate(20deg);
}

/* NOTE */

.note{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    background:white;
    border:2px solid #ddd;
    padding:25px;
    font-size:22px;
    color:#333;
    line-height:1.7;
}

.signature{
    margin-top:30px;
    text-align:right;
}

/* HEARTS */

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:up 4s linear forwards;
}

/* BUTTON */

button{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 35px;
    border:none;
    border-radius:30px;

    background:#ff4d6d;
    color:white;

    font-size:18px;
    cursor:pointer;

    box-shadow:
    0 0 15px rgba(255,77,109,0.5);
}

/* ANIMATIONS */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes up{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* MOBILE */

@media(max-width:500px){

    .card{
        width:100%;
        height:100vh;
        border-radius:0;
    }

    .bouquet{
        transform:
        translateX(-50%)
        scale(0.9);
    }

    .note{
        width:80%;
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="card">

    <div class="bouquet">

        <div class="flower sunflower"></div>

        <div class="flower rose1"></div>

        <div class="flower rose2"></div>

        <div class="flower rose3"></div>

        <div class="flower blue"></div>

        <div class="flower purple"></div>

        <div class="flower small1"></div>

        <div class="flower small2"></div>

        <div class="flower small3"></div>

        <div class="leaf l1"></div>

        <div class="leaf l2"></div>

        <div class="leaf l3"></div>

        <div class="leaf l4"></div>

    </div>

    <div class="note">

        Dear You 🌸

        <br><br>

        These flowers are for you.

        <br>

        Hope they make your day a little brighter 💖

        <div class="signature">

            — from me

        </div>

    </div>

    <button onclick="love()">

        Click Me ❤️

    </button>

</div>

<script>

function love(){

    for(let i=0;i<25;i++){

        const heart =
        document.createElement('div');

        heart.classList.add('heart');

        heart.innerHTML = '❤';

        heart.style.left =
        Math.random() * window.innerWidth + 'px';

        heart.style.top = '100%';

        heart.style.fontSize =
        Math.random() * 30 + 20 + 'px';

        document.body.appendChild(heart);

        setTimeout(()=>{

            heart.remove();

        },4000);
    }
}

</script>

</body>
</html>
