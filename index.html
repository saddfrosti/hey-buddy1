<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Bouquet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
    radial-gradient(circle at center,
    #071633 0%,
    #020611 60%,
    #000 100%);
    
    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
}

/* STARS */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle linear infinite;
}

/* GLOW */

.glow{
    position:absolute;
    width:500px;
    height:500px;

    background:
    radial-gradient(circle,
    rgba(255,105,180,0.2),
    transparent 70%);

    filter:blur(40px);

    left:50%;
    top:42%;

    transform:translate(-50%,-50%);
}

/* MAIN */

.scene{
    position:relative;
    width:100%;
    height:100%;
}

/* FLOATING HEARTS */

.heart{
    position:absolute;
    color:#ff7eb6;
    animation:float 6s linear infinite;
    opacity:0.8;
}

/* GLOW CIRCLES */

.circle{
    position:absolute;
    border:2px solid rgba(255,192,217,0.4);
    border-radius:50%;
    animation:pulse 4s infinite;
}

/* BOUQUET */

.bouquet{
    position:absolute;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    width:420px;
    height:520px;
}

/* WRAP */

.wrap{
    position:absolute;

    bottom:70px;
    left:50%;

    transform:
    translateX(-50%);

    width:320px;
    height:260px;

    background:
    linear-gradient(
    to bottom,
    rgba(40,40,50,0.75),
    rgba(10,10,20,0.95));

    clip-path:polygon(
    50% 100%,
    0 10%,
    100% 10%
    );

    border:2px solid
    rgba(255,120,180,0.15);

    box-shadow:
    0 0 30px
    rgba(255,105,180,0.2);
}

/* RIBBON */

.ribbon-center{
    position:absolute;

    bottom:90px;
    left:50%;

    transform:
    translateX(-50%);

    width:38px;
    height:38px;

    background:#ff6ba9;

    border-radius:12px;

    z-index:10;

    box-shadow:
    0 0 20px
    rgba(255,105,180,0.6);
}

.ribbon-left,
.ribbon-right{

    position:absolute;

    bottom:88px;

    width:90px;
    height:55px;

    background:
    linear-gradient(
    to bottom,
    #ff9ac6,
    #ff5d9e);

    border-radius:100px;

    z-index:9;
}

.ribbon-left{

    left:110px;

    transform:
    rotate(-10deg);
}

.ribbon-right{

    right:110px;

    transform:
    rotate(10deg);
}

/* STEMS */

.stem{
    position:absolute;

    width:6px;

    background:#2aff7a;

    bottom:120px;

    left:50%;

    border-radius:10px;

    transform-origin:bottom;
}

/* FLOWERS */

.flower{
    position:absolute;

    width:85px;
    height:85px;

    border-radius:50%;

    animation:sway 4s ease-in-out infinite;
}

/* PETALS */

.petal{
    position:absolute;

    width:42px;
    height:26px;

    background:
    radial-gradient(circle,
    #fff 0%,
    #ffd1e6 100%);

    border-radius:50%;

    box-shadow:
    0 0 15px
    rgba(255,192,217,0.7);
}

/* PETAL POSITIONS */

.p1{
    top:0;
    left:22px;
}

.p2{
    top:18px;
    left:0;
    transform:rotate(-30deg);
}

.p3{
    top:18px;
    right:0;
    transform:rotate(30deg);
}

.p4{
    bottom:0;
    left:22px;
}

/* CENTER */

.center{
    position:absolute;

    width:18px;
    height:18px;

    background:#ffe066;

    border-radius:50%;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    box-shadow:
    0 0 15px #ffe066;
}

/* FLOWER POSITIONS */

.f1{
    left:80px;
    top:140px;
}

.f2{
    left:160px;
    top:60px;
}

.f3{
    right:80px;
    top:140px;
}

.f4{
    left:170px;
    top:180px;
}

.f5{
    right:120px;
    top:240px;
}

/* STEMS */

.s1{
    height:230px;
    left:140px;
    transform:rotate(-8deg);
}

.s2{
    height:300px;
    left:210px;
}

.s3{
    height:230px;
    left:280px;
    transform:rotate(8deg);
}

.s4{
    height:180px;
    left:220px;
}

.s5{
    height:150px;
    left:270px;
}

/* LEAVES */

.leaf{
    position:absolute;

    width:55px;
    height:22px;

    background:#1bc45e;

    border-radius:100px 0;

    opacity:0.9;
}

.l1{
    left:120px;
    top:280px;
    transform:rotate(-35deg);
}

.l2{
    right:120px;
    top:280px;
    transform:rotate(140deg);
}

.l3{
    left:170px;
    top:350px;
    transform:rotate(-20deg);
}

.l4{
    right:160px;
    top:360px;
    transform:rotate(130deg);
}

/* GRASS */

.grass{
    position:absolute;

    bottom:-40px;

    width:140px;
    height:260px;

    border-left:5px solid #29ff6a;

    border-radius:100px;

    opacity:0.8;
}

.g1{
    left:6%;
    transform:rotate(-10deg);
}

.g2{
    left:18%;
    height:200px;
    transform:rotate(8deg);
}

.g3{
    right:6%;
    transform:rotate(10deg);
}

.g4{
    right:18%;
    height:220px;
    transform:rotate(-8deg);
}

/* BUTTON */

button{
    position:absolute;

    bottom:70px;
    left:50%;

    transform:
    translateX(-50%);

    border:none;

    padding:20px 70px;

    border-radius:50px;

    background:
    linear-gradient(
    to right,
    #ff8ab7,
    #ff4d88);

    color:white;

    font-size:34px;

    cursor:pointer;

    box-shadow:
    0 0 35px
    rgba(255,105,180,0.8);

    transition:0.3s;
}

button:hover{

    transform:
    translateX(-50%)
    scale(1.05);
}

/* ANIMATIONS */

@keyframes twinkle{

    0%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.2;
    }
}

@keyframes sway{

    0%{
        transform:rotate(-2deg);
    }

    50%{
        transform:rotate(2deg);
    }

    100%{
        transform:rotate(-2deg);
    }
}

@keyframes float{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes pulse{

    0%{
        transform:scale(0.8);
        opacity:0.2;
    }

    50%{
        opacity:0.7;
    }

    100%{
        transform:scale(1.5);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="scene">

<div class="glow"></div>

<!-- GRASS -->

<div class="grass g1"></div>
<div class="grass g2"></div>
<div class="grass g3"></div>
<div class="grass g4"></div>

<!-- BOUQUET -->

<div class="bouquet">

<div class="wrap"></div>

<div class="ribbon-left"></div>
<div class="ribbon-right"></div>
<div class="ribbon-center"></div>

<div class="stem s1"></div>
<div class="stem s2"></div>
<div class="stem s3"></div>
<div class="stem s4"></div>
<div class="stem s5"></div>

<div class="leaf l1"></div>
<div class="leaf l2"></div>
<div class="leaf l3"></div>
<div class="leaf l4"></div>

<!-- FLOWERS -->

<div class="flower f1">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>

</div>

<div class="flower f2">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>

</div>

<div class="flower f3">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>

</div>

<div class="flower f4">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>

</div>

<div class="flower f5">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>

</div>

</div>

<button onclick="burst()">

Click Me 💕

</button>

</div>

<script>

/* TWINKLING STARS */

for(let i=0;i<150;i++){

    const star =
    document.createElement('div');

    star.classList.add('star');

    const size =
    Math.random()*3;

    star.style.width =
    size + 'px';

    star.style.height =
    size + 'px';

    star.style.left =
    Math.random()*100 + 'vw';

    star.style.top =
    Math.random()*100 + 'vh';

    star.style.animationDuration =
    Math.random()*3+2 + 's';

    document.body.appendChild(star);
}

/* FLOATING HEARTS */

function createHeart(){

    const heart =
    document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML='❤';

    heart.style.left =
    Math.random()*100+'vw';

    heart.style.top =
    '100vh';

    heart.style.fontSize =
    Math.random()*20+18+'px';

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },6000);
}

setInterval(createHeart,900);

/* GLOW CIRCLES */

for(let i=0;i<8;i++){

    const circle =
    document.createElement('div');

    circle.classList.add('circle');

    const size =
    Math.random()*60+20;

    circle.style.width =
    size+'px';

    circle.style.height =
    size+'px';

    circle.style.left =
    Math.random()*100+'vw';

    circle.style.top =
    Math.random()*100+'vh';

    circle.style.animationDelay =
    Math.random()*4+'s';

    document.body.appendChild(circle);
}

/* BUTTON */

function burst(){

    for(let i=0;i<20;i++){

        createHeart();
    }
}

</script>

</body>
</html>
