<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Bouquet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f3ee;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Courier New', monospace;
}

/* CARD */

.card{
    width:430px;
    height:850px;
    background:white;
    border-radius:14px;
    position:relative;
    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.15);
}

/* FLOWER AREA */

.bouquet{
    position:relative;
    width:100%;
    height:480px;
}

/* BACK CIRCLE */

.circle{
    position:absolute;
    width:420px;
    height:420px;
    background:#efe7de;
    border-radius:50%;
    left:50%;
    top:10px;
    transform:translateX(-50%);
}

/* SVG */

svg{
    position:absolute;
    width:100%;
    height:100%;
    z-index:2;
}

/* NOTE */

.note{
    position:absolute;
    width:330px;
    background:#fffdf9;
    border:2px solid #e8ddd1;

    left:50%;
    bottom:120px;

    transform:translateX(-50%);

    padding:28px;

    color:#222;

    font-size:18px;

    line-height:1.7;

    box-shadow:
    0 5px 15px rgba(0,0,0,0.05);
}

/* SIGNATURE */

.signature{
    margin-top:30px;
    text-align:right;
}

/* BUTTON */

button{
    position:absolute;
    bottom:35px;
    left:50%;

    transform:translateX(-50%);

    border:none;

    background:
    linear-gradient(
    to right,
    #ff5d8f,
    #ff3d71);

    color:white;

    padding:18px 55px;

    border-radius:40px;

    font-size:28px;

    cursor:pointer;

    box-shadow:
    0 10px 20px rgba(255,61,113,0.3);

    transition:0.3s;
}

button:hover{
    transform:
    translateX(-50%)
    scale(1.05);
}

/* HEARTS */

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float 4s linear forwards;
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* MOBILE */

@media(max-width:500px){

    .card{
        width:100%;
        height:100vh;
        border-radius:0;
    }

    .note{
        width:82%;
        font-size:16px;
    }

    button{
        font-size:22px;
        padding:15px 45px;
    }
}

</style>
</head>

<body>

<div class="card">

<div class="bouquet">

<div class="circle"></div>

<svg viewBox="0 0 500 500">

<!-- LEAVES -->

<g fill="#5c8d76">

<ellipse cx="90" cy="170" rx="14" ry="35"
transform="rotate(-30 90 170)"/>

<ellipse cx="120" cy="120" rx="14" ry="35"
transform="rotate(-20 120 120)"/>

<ellipse cx="420" cy="170" rx="14" ry="35"
transform="rotate(30 420 170)"/>

<ellipse cx="390" cy="120" rx="14" ry="35"
transform="rotate(20 390 120)"/>

<ellipse cx="90" cy="320" rx="14" ry="35"
transform="rotate(-45 90 320)"/>

<ellipse cx="410" cy="320" rx="14" ry="35"
transform="rotate(45 410 320)"/>

</g>

<!-- RED ROSE -->

<g>

<circle cx="190" cy="100" r="55"
fill="#d90429"/>

<circle cx="190" cy="100" r="40"
fill="#ef476f"/>

<circle cx="190" cy="100" r="25"
fill="#ff8fab"/>

</g>

<!-- SUNFLOWER -->

<g>

<circle cx="320" cy="110" r="65"
fill="#ffbe0b"/>

<circle cx="320" cy="110" r="35"
fill="#5a3d2b"/>

<g fill="#ffbe0b">

<ellipse cx="320" cy="30" rx="16" ry="38"/>
<ellipse cx="320" cy="190" rx="16" ry="38"/>

<ellipse cx="240" cy="110" rx="38" ry="16"/>
<ellipse cx="400" cy="110" rx="38" ry="16"/>

<ellipse cx="265" cy="55" rx="16" ry="38"
transform="rotate(-45 265 55)"/>

<ellipse cx="375" cy="55" rx="16" ry="38"
transform="rotate(45 375 55)"/>

<ellipse cx="265" cy="165" rx="16" ry="38"
transform="rotate(45 265 165)"/>

<ellipse cx="375" cy="165" rx="16" ry="38"
transform="rotate(-45 375 165)"/>

</g>

</g>

<!-- PINK FLOWER -->

<g>

<circle cx="230" cy="200" r="65"
fill="#ffcad4"/>

<circle cx="230" cy="200" r="45"
fill="#ff8fab"/>

<circle cx="230" cy="200" r="20"
fill="#fff0f3"/>

</g>

<!-- WHITE FLOWER -->

<g>

<circle cx="320" cy="280" r="55"
fill="#edf6f9"/>

<circle cx="320" cy="280" r="20"
fill="#4361ee"/>

</g>

<!-- LILY -->

<g fill="#ffc8dd">

<ellipse cx="120" cy="290" rx="30" ry="70"/>
<ellipse cx="170" cy="340" rx="30" ry="70"
transform="rotate(60 170 340)"/>

<ellipse cx="70" cy="340" rx="30" ry="70"
transform="rotate(-60 70 340)"/>

</g>

<!-- ORANGE FLOWER -->

<g>

<circle cx="320" cy="380" r="50"
fill="#fb8500"/>

<circle cx="320" cy="380" r="28"
fill="#ffd166"/>

</g>

<!-- PURPLE FLOWER -->

<g fill="#7b2cbf">

<ellipse cx="240" cy="430" rx="28" ry="70"/>
<ellipse cx="240" cy="430" rx="28" ry="70"
transform="rotate(72 240 430)"/>

<ellipse cx="240" cy="430" rx="28" ry="70"
transform="rotate(144 240 430)"/>

<ellipse cx="240" cy="430" rx="28" ry="70"
transform="rotate(216 240 430)"/>

<ellipse cx="240" cy="430" rx="28" ry="70"
transform="rotate(288 240 430)"/>

</g>

</svg>

</div>

<div class="note">

Dear You,

<br><br>

These flowers are for you 🌸

<br>

Hope they make your day a little brighter 💖

<div class="signature">

Sincerely,

<br>

someone who cares

</div>

</div>

<button onclick="love()">

Click Me 🤍

</button>

</div>

<script>

function love(){

    for(let i=0;i<30;i++){

        const heart =
        document.createElement('div');

        heart.classList.add('heart');

        heart.innerHTML = '❤';

        heart.style.left =
        Math.random() * window.innerWidth + 'px';

        heart.style.top = '100%';

        heart.style.fontSize =
        Math.random() * 25 + 15 + 'px';

        document.body.appendChild(heart);

        setTimeout(()=>{

            heart.remove();

        },4000);
    }
}

</script>

</body>
</html>
