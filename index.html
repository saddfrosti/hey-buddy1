<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey buddy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

/* BACKGROUND GLOW */

.background{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(255,0,100,0.15),
    transparent 60%);
}

/* MAIN */

.container{
    position:relative;
    z-index:2;
    text-align:center;
}

.title{
    color:white;
    font-size:70px;
    margin-bottom:20px;
    text-shadow:0 0 20px hotpink;
    animation:glow 2s infinite alternate;
}

.subtitle{
    color:#ff9ecf;
    margin-bottom:50px;
    font-size:22px;
    letter-spacing:3px;
}

/* BOUQUET */

.bouquet{
    position:relative;
    width:500px;
    height:500px;
    margin:auto;
}

/* WRAP */

.wrap{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:260px;
    height:260px;
    background:linear-gradient(
    to bottom,
    rgba(40,40,40,0.8),
    rgba(0,0,0,0.95));
    
    clip-path:polygon(
    50% 100%,
    0 0,
    100% 0
    );

    border:2px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 30px rgba(255,0,100,0.3);
}

/* ROSES */

.rose{
    position:absolute;
    width:130px;
    height:130px;
    border-radius:50%;
    background:
    radial-gradient(circle,
    #ff7eb6 0%,
    #ff0066 70%,
    #70002e 100%);
    
    box-shadow:
    0 0 25px rgba(255,0,120,0.6);

    animation:sway 4s ease-in-out infinite;
}

/* PETAL EFFECT */

.rose::before,
.rose::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    border:6px solid rgba(255,255,255,0.15);
}

.rose::before{
    transform:scale(0.75);
}

.rose::after{
    transform:scale(0.5);
}

/* FLOWER POSITIONS */

.r1{
    top:80px;
    left:180px;
}

.r2{
    top:140px;
    left:90px;
}

.r3{
    top:140px;
    right:90px;
}

.r4{
    top:220px;
    left:150px;
}

.r5{
    top:220px;
    right:150px;
}

/* LEAVES */

.leaf{
    position:absolute;
    width:70px;
    height:35px;
    background:linear-gradient(
    to right,
    #00ff66,
    #006b2d);
    
    border-radius:50px 0 50px 0;
    opacity:0.9;
}

.l1{
    top:250px;
    left:80px;
    transform:rotate(-25deg);
}

.l2{
    top:260px;
    right:80px;
    transform:rotate(25deg);
}

.l3{
    top:320px;
    left:180px;
    transform:rotate(-15deg);
}

.l4{
    top:320px;
    right:180px;
    transform:rotate(15deg);
}

/* BUTTON */

button{
    margin-top:40px;
    padding:16px 40px;
    border:none;
    border-radius:40px;
    background:linear-gradient(
    to right,
    #ff0066,
    #ff4da6);

    color:white;
    font-size:20px;
    cursor:pointer;

    box-shadow:
    0 0 20px rgba(255,0,100,0.5);

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:
    0 0 40px rgba(255,0,100,0.9);
}

#message{
    margin-top:25px;
    color:white;
    font-size:28px;
    text-shadow:0 0 15px hotpink;
}

/* HEARTS */

.heart{
    position:absolute;
    color:#ff4da6;
    animation:float 4s linear forwards;
}

/* ANIMATIONS */

@keyframes sway{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 15px hotpink;
    }

    to{
        text-shadow:
        0 0 35px hotpink,
        0 0 60px #ff0066;
    }
}

@media(max-width:700px){

    .title{
        font-size:45px;
    }

    .bouquet{
        transform:scale(0.75);
    }
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1 class="title">🌹 Digital Bouquet 🌹</h1>

    <p class="subtitle">
        made with love
    </p>

    <div class="bouquet">

        <div class="wrap"></div>

        <div class="rose r1"></div>
        <div class="rose r2"></div>
        <div class="rose r3"></div>
        <div class="rose r4"></div>
        <div class="rose r5"></div>

        <div class="leaf l1"></div>
        <div class="leaf l2"></div>
        <div class="leaf l3"></div>
        <div class="leaf l4"></div>

    </div>

    <button onclick="showLove()">
        Click Me ❤️
    </button>

    <div id="message"></div>

</div>

<script>

const messages = [

"These flowers are for you 🌹",

"You deserve the prettiest bouquet 💖",

"Sending you digital flowers ❤️",

"You make life beautiful 🌸",

"A bouquet made with love 💐"

];

function showLove(){

    const msg =
    document.getElementById("message");

    msg.innerHTML =
    messages[Math.floor(Math.random()
    * messages.length)];

    for(let i=0;i<20;i++){

        createHeart();

    }
}

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random() * window.innerWidth + "px";

    heart.style.top = "100%";

    heart.style.fontSize =
    Math.random() * 30 + 20 + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },4000);
}

</script>

</body>
</html>
