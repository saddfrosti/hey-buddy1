<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoooo</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #ffb6c1, #ffc0cb);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: white;
      font-size: 60px;
      text-shadow: 0 0 15px white;
    }

    .flowers {
      display: flex;
      gap: 50px;
      margin-top: 40px;
      justify-content: center;
      align-items: flex-end;
    }

    .flower {
      position: relative;
      width: 120px;
      height: 250px;
      animation: sway 3s ease-in-out infinite;
    }

    .stem {
      position: absolute;
      width: 10px;
      height: 150px;
      background: green;
      left: 55px;
      bottom: 0;
      border-radius: 10px;
    }

    .petal {
      width: 60px;
      height: 60px;
      background: hotpink;
      border-radius: 50%;
      position: absolute;
    }

    .p1 { top: 20px; left: 30px; }
    .p2 { top: 50px; left: 0px; }
    .p3 { top: 50px; left: 60px; }
    .p4 { top: 80px; left: 30px; }

    .center {
      width: 40px;
      height: 40px;
      background: yellow;
      border-radius: 50%;
      position: absolute;
      top: 55px;
      left: 40px;
      z-index: 2;
      box-shadow: 0 0 20px yellow;
    }

    button {
      margin-top: 40px;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      background: white;
      color: hotpink;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #message {
      color: white;
      margin-top: 20px;
      font-size: 24px;
    }

    @keyframes sway {
      0% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
      100% { transform: rotate(-3deg); }
    }

    @keyframes float {
      0% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1> Digital Flowers </h1>

    <div class="flowers">

      <div class="flower">
        <div class="stem"></div>
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="center"></div>
      </div>

      <div class="flower">
        <div class="stem"></div>
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="center"></div>
      </div>

      <div class="flower">
        <div class="stem"></div>
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="center"></div>
      </div>

    </div>

    <button onclick="showLove()">Click Me </button>

    <div id="message"></div>

  </div>

  <script>
    const messages = [
      "These flowers are for you ",
      "Hope your day is beautiful ",
      "Sending digital love ",
      "You deserve flowers every day buttt youll get real ones soon"
    ];

    function showLove() {
      const msg = document.getElementById("message");

      msg.innerHTML =
        messages[Math.floor(Math.random() * messages.length)];

      for(let i = 0; i < 10; i++) {
        createHeart();
      }
    }

    function createHeart() {
      const heart = document.createElement("div");

      heart.innerHTML = "❤️";

      heart.style.position = "absolute";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = "100%";
      heart.style.fontSize = "30px";
      heart.style.animation = "float 4s linear forwards";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 4000);
    }
  </script>

</body>
</html>
